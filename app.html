<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet Check</title>
  <link rel="icon" type="image/jpeg" href="images/icon.jpg">

  <!-- Apply saved theme before first paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      var theme = localStorage.getItem("wc-theme") || "dark";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom styles -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary app-navbar">
    <div class="container">
      <span class="navbar-brand">Wallet Check</span>
      <div class="d-flex align-items-center">
        <button type="button" class="btn theme-toggle-btn me-2" data-theme-toggle title="Toggle dark/light mode">🌙</button>
        <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <button id="logoutBtn" class="btn btn-light btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">

    <!-- PROFILE CARD -->
    <div class="card shadow-sm mb-4">
      <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <h2 id="profileFullName" class="h5 mb-1">Loading profile...</h2>
          <p class="mb-0 text-muted">
            <span id="profileDesignation"></span>
            <span id="profileCompanySep" class="d-none"> at </span>
            <span id="profileCompany"></span>
          </p>
        </div>
        <button
          type="button"
          class="btn btn-outline-primary btn-sm"
          data-bs-toggle="modal"
          data-bs-target="#editProfileModal"
        >
          Edit Profile
        </button>
      </div>
    </div>

    <!-- MONTH NAVIGATOR -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <button type="button" class="btn btn-outline-secondary btn-sm" id="prevMonthBtn">&laquo; Prev</button>
      <h2 class="h5 mb-0" id="viewedMonthLabel">Loading...</h2>
      <button type="button" class="btn btn-outline-secondary btn-sm" id="nextMonthBtn">Next &raquo;</button>
    </div>

    <!-- CURRENT BALANCE -->
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center">
            <h2 class="h6 text-uppercase text-muted mb-2">Income</h2>
            <p class="h4 mb-0" id="incomeTileAmount">LKR 0.00</p>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center">
            <h2 class="h6 text-uppercase text-muted mb-2">Spent</h2>
            <p class="h4 mb-0" id="spentTileAmount">LKR 0.00</p>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card shadow-sm h-100" id="balanceCard">
          <div class="card-body text-center">
            <h2 class="h6 text-uppercase mb-2">Current Balance</h2>
            <p class="h4 mb-0" id="balanceAmount">LKR 0.00</p>
          </div>
        </div>
      </div>
    </div>

    <!-- MONTHLY INCOME -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="incomeCardTitle" class="h6 text-muted mb-3">Income</h2>
        <div id="incomeAlert" class="alert d-none" role="alert"></div>
        <form id="incomeForm" class="row g-2 align-items-center">
          <div class="col-auto">
            <span class="input-group-text">LKR</span>
          </div>
          <div class="col-auto">
            <input
              type="number"
              class="form-control"
              id="incomeAmount"
              min="0"
              step="0.01"
              placeholder="Enter amount"
              required
            />
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-primary">Save Income</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ADD EXPENSE -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h6 text-muted mb-3">Add Expense</h2>
        <div id="expenseAlert" class="alert d-none" role="alert"></div>

        <form id="expenseForm" class="row g-3">
          <div class="col-12 col-md-4">
            <label for="expenseAmount" class="form-label">Amount (LKR)</label>
            <input
              type="number"
              class="form-control"
              id="expenseAmount"
              min="0.01"
              step="0.01"
              required
            />
          </div>

          <div class="col-12 col-md-4">
            <label for="expenseCategory" class="form-label">Category</label>
            <select class="form-select" id="expenseCategory" required>
              <option value="" disabled selected>Loading categories...</option>
            </select>
          </div>

          <div class="col-12 col-md-4">
            <label for="expenseDatetime" class="form-label">Date &amp; Time</label>
            <input
              type="datetime-local"
              class="form-control"
              id="expenseDatetime"
              required
            />
          </div>

          <!-- Inline "add custom category" -->
          <div class="col-12">
            <div class="input-group input-group-sm" style="max-width: 400px;">
              <input
                type="text"
                class="form-control"
                id="newCategoryName"
                placeholder="Add a custom category..."
                maxlength="100"
              />
              <button class="btn btn-outline-secondary" type="button" id="addCategoryBtn">
                Add
              </button>
            </div>
          </div>

          <div class="col-12">
            <label for="expenseDescription" class="form-label">Description (optional)</label>
            <textarea
              class="form-control"
              id="expenseDescription"
              rows="2"
              maxlength="500"
            ></textarea>
          </div>

          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="expenseRecurring" />
              <label class="form-check-label" for="expenseRecurring">
                This is a recurring expense
              </label>
            </div>
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary">Add Expense</button>
          </div>
        </form>
      </div>
    </div>

    <!-- EXPENSE LIST -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="expenseListTitle" class="h6 text-muted mb-3">Expenses</h2>
        <div id="expenseListAlert" class="alert d-none" role="alert"></div>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>Date &amp; Time</th>
                <th>Category</th>
                <th>Amount (LKR)</th>
                <th>Description</th>
                <th>Recurring</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="expenseListBody">
              <tr>
                <td colspan="6" class="text-center text-muted">Loading expenses...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- EDIT EXPENSE MODAL -->
  <div class="modal fade" id="editExpenseModal" tabindex="-1" aria-labelledby="editExpenseModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="editExpenseForm">
          <div class="modal-header">
            <h5 class="modal-title" id="editExpenseModalLabel">Edit Expense</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="editExpenseAlert" class="alert d-none" role="alert"></div>
            <input type="hidden" id="editExpenseId" />
            <div class="mb-3">
              <label for="editExpenseAmount" class="form-label">Amount (LKR)</label>
              <input type="number" class="form-control" id="editExpenseAmount" min="0.01" step="0.01" required />
            </div>
            <div class="mb-3">
              <label for="editExpenseCategory" class="form-label">Category</label>
              <select class="form-select" id="editExpenseCategory" required></select>
            </div>
            <div class="mb-3">
              <label for="editExpenseDatetime" class="form-label">Date &amp; Time</label>
              <input type="datetime-local" class="form-control" id="editExpenseDatetime" required />
            </div>
            <div class="mb-3">
              <label for="editExpenseDescription" class="form-label">Description (optional)</label>
              <textarea class="form-control" id="editExpenseDescription" rows="2" maxlength="500"></textarea>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="editExpenseRecurring" />
              <label class="form-check-label" for="editExpenseRecurring">This is a recurring expense</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- EDIT PROFILE MODAL -->
  <div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="editProfileForm">
          <div class="modal-header">
            <h5 class="modal-title" id="editProfileModalLabel">Edit Profile</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="profileAlert" class="alert d-none" role="alert"></div>
            <div class="mb-3">
              <label for="editFullName" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="editFullName" maxlength="200" />
            </div>
            <div class="mb-3">
              <label for="editDesignation" class="form-label">Designation</label>
              <input type="text" class="form-control" id="editDesignation" maxlength="200" />
            </div>
            <div class="mb-3">
              <label for="editCompany" class="form-label">Company</label>
              <input type="text" class="form-control" id="editCompany" maxlength="200" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS bundle (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Supabase JS client (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App config + client + logic -->
  <script src="config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/income.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
