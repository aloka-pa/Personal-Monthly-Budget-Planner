<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Wallet Check</title>

  <!-- Apply saved theme before first paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      var theme = localStorage.getItem("wc-theme") || "dark";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom styles -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary app-navbar">
    <div class="container">
      <span class="navbar-brand">Wallet Check</span>
      <div class="d-flex align-items-center">
        <button type="button" class="btn theme-toggle-btn me-2" data-theme-toggle title="Toggle dark/light mode">🌙</button>
        <a href="app.html" class="btn btn-outline-light btn-sm me-2">Back to App</a>
        <button id="logoutBtn" class="btn btn-light btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <h1 class="h4 mb-4">Budget History Dashboard</h1>

    <div id="dashboardAlert" class="alert d-none" role="alert"></div>

    <!-- CATEGORY SPENDING OVER TIME (LINE CHART) -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h6 text-muted mb-3">Spending by Category Over Time</h2>
        <canvas id="categoryTrendChart" height="100"></canvas>
      </div>
    </div>

    <!-- MONTHLY TILES -->
    <h2 class="h6 text-muted mb-3">Monthly Summary</h2>
    <div class="row g-2 mb-4" id="monthTileGrid">
      <div class="col-12 text-center text-muted">Loading months...</div>
    </div>
  </main>

  <!-- Bootstrap 5 JS bundle (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Chart.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- Supabase JS client (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App config + client + logic -->
  <script src="config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
