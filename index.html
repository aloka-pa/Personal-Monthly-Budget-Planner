<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Personal Monthly Budget Planner</title>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom styles -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>

  <main class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
      <div class="card-body p-4">
        <h1 class="h4 text-center mb-4">Personal Monthly Budget Planner</h1>

        <!-- Shared alert box for errors/success messages -->
        <div id="authAlert" class="alert d-none" role="alert"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm">
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="loginEmail" required autocomplete="email" />
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="loginPassword" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
          <p class="text-center mt-3 mb-0">
            Don't have an account?
            <a href="#" id="showRegister">Register</a>
          </p>
        </form>

        <!-- REGISTER FORM (hidden by default) -->
        <form id="registerForm" class="d-none">
          <div class="mb-3">
            <label for="registerEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="registerEmail" required autocomplete="email" />
          </div>
          <div class="mb-3">
            <label for="registerPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="registerPassword" required minlength="6" autocomplete="new-password" />
            <div class="form-text">At least 6 characters.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
          <p class="text-center mt-3 mb-0">
            Already have an account?
            <a href="#" id="showLogin">Login</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <!-- Bootstrap 5 JS bundle (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Supabase JS client (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App config + client + logic -->
  <script src="config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
